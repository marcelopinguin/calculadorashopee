<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora Shopee</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI,Arial,sans-serif}
body{background:linear-gradient(135deg,#0047FF,#1b6cff);padding:20px}
.container{max-width:1100px;margin:auto;background:#fff;border-radius:18px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.top{background:#ff7b00;color:#fff;text-align:center;padding:18px;font-size:30px;font-weight:bold}
.content{display:flex}
.left{width:45%;background:#0d47ff;color:#fff;padding:30px}
.right{width:55%;padding:30px}
label{display:block;margin-top:16px;font-weight:bold}
input,select{width:100%;padding:12px;border:none;border-radius:8px;margin-top:6px;font-size:16px}
.card{background:#f5f7ff;border-left:6px solid royalblue;border-radius:10px;padding:14px;margin-top:20px}
.card h3{color:#111;margin-bottom:10px}
.sug{background:#fff3e6;border-left:5px solid #ff7b00;border-radius:8px;padding:10px;margin-top:10px;color:#111}
.valor{font-size:22px;color:#ff6600;font-weight:bold}
.small{font-size:11px;color:#555;font-style:italic;margin-top:5px;line-height:1.4}
.ok{color:#159b2c;font-size:22px;font-weight:bold}
hr{border:none;border-top:1px solid #ddd;margin:10px 0}

/* Responsividade */
@media (max-width:600px){
.content{flex-direction:column}
.left,.right{width:100%}
.sugwrap{display:flex;gap:8px}
.sug{flex:1;margin-top:0}
}
</style>
</head>
<body>
<div class="container">
<div class="top">🛒 Calculadora Shopee</div>
<div class="content">
<div class="left">
<label>Custo do Produto</label>
<input id="custo" type="number" step="0.01" oninput="calc()">

<label>Valor de Venda</label>
<input id="venda" type="number" step="0.01" oninput="calc()">

<label>Porcentagem de Imposto</label>
<select id="imp" onchange="calc()">
<option value="4" selected>4%</option>
<option value="7.3">7,3%</option>
<option value="9.5">9,5%</option>
<option value="10.7">10,7%</option>
<option value="14.3">14,3%</option>
<option value="19">19%</option>
</select>

<div id="sugestoes"></div>
</div>

<div class="right">
<div id="resultado" style="text-align:center;color:#777;padding-top:80px">
Preencha o custo do produto.
</div>
</div>
</div>
</div>

<script>
const fmt=v=>v.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
function calc(){
let c=parseFloat(custo.value)||0;
if(c<=0){
sugestoes.innerHTML="";
resultado.innerHTML="Preencha o custo do produto.";
return;
}
let ip=parseFloat(imp.value)/100;
let fator=1-(0.20+ip);

function bloco(l){
let p=(c+4+l)/fator;
let tx=p*0.20;
let im=p*ip;
return `<div class="sug">
<div><b>Lucro ${fmt(l)}</b></div>
<div class="valor">${fmt(p)}</div>
<div class="small">*Custo ${fmt(c)} + Taxa Fixa ${fmt(4)} + Comissão ${fmt(tx)} + Imposto ${fmt(im)} + Lucro ${fmt(l)}*</div>
</div>`;
}

sugestoes.innerHTML=`
<h3 style="margin:18px 0 10px;color:#fff">Preços Sugeridos</h3>
<div class="sugwrap">
${bloco(3)}
${bloco(5)}
${bloco(7)}
</div>`;

if(venda.value===""){
resultado.innerHTML="<div style='padding-top:80px'>Informe o valor de venda para visualizar o resultado.</div>";
return;
}

let v=parseFloat(venda.value);
let fixa=4;
let sh=v*0.20;
let imposto=v*ip;
// Valor recebido após taxas
let liquido=v-fixa-sh-imposto;

// Lucro bruto (sem considerar taxas)
let lucroBruto=v-c;

// Lucro líquido
let lucro=liquido-c;

// Margens
let margemBruta=(lucroBruto/v)*100;
let margemLiquida=(lucro/liquido)*100;

resultado.innerHTML=`
<div class="card">

<h3>Resultado da Venda</h3>

📦 Custo:
<b>${fmt(c)}</b>
<hr>

💵 Venda:
<b>${fmt(v)}</b>
<hr>

🏪 Taxa fixa Shopee:
<b>${fmt(fixa)}</b>
<hr>

🏪 Taxa Shopee (20%):
<b>${fmt(sh)}</b>
<hr>

🏛 Imposto (${imp.value}%):
<b>${fmt(imposto)}</b>
<hr>

💰 Lucro Líquido

<br>

<span class="ok">${fmt(lucro)}</span>

<hr>

📈 Porcentagem de Lucro Sobre Venda Bruta

<br>

<small>(sem impostos e taxas)</small>

<br><br>

<b>${margemBruta.toFixed(2)}%</b>

<hr>

📊 Porcentagem de Lucro Sobre Venda Líquida

<br>

<small>(com impostos e taxas)</small>

<br><br>

<b>${margemLiquida.toFixed(2)}%</b>

</div>`;
}
</script>
</body>
</html>
